name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./my-terraform-project

      - name: Terraform Init
        run: terraform init
        working-directory: ./my-terraform-project
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./my-terraform-project

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./my-terraform-project
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      - name: Terraform Apply
        # Change this to 'terraform apply -auto-approve' when you are ready to launch your AWS infrastructure
        run: echo "Skipping apply for now to save costs"
        working-directory: ./my-terraform-project
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
      
      # 8. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 9. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 10. Build Docker Image (Executed from Project Root Context)
      - name: Build Docker Image
        run: |
          docker build -t producation-app:latest ./production-app

      # 11. Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag producation-app:latest 095055159123.dkr.ecr.ap-south-1.amazonaws.com/producation-app:latest

      # 12. Push Docker Image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push 095055159123.dkr.ecr.ap-south-1.amazonaws.com/producation-app:latest

  # 13. Dynamic IP Discovery & GitOps Deployment via AWS SSM
      - name: Discover Instance and Deploy to K3s
        run: |
          # 1. Dynamically locate live EC2 Instance IDs and format them as a space-separated list
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running" "Name=tag:Name,Values=my-asg-instance" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\n' ' ' | xargs)
          
          if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
            echo "Error: No running EC2 instances found matching tag Name=my-asg-instance."
            exit 1
          fi
          echo "Found running production instance targets: $INSTANCE_IDS"

          # 2. Convert manifests into completely safe, single-line Base64 strings
          DEPLOY_BASE64=$(cat k8s/deployment.yaml | base64 -w 0)
          SERVICE_BASE64=$(cat k8s/service.yaml | base64 -w 0)

          # 3. Securely push manifests and deploy applications hands-free via the Systems Manager API
          aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --comment "Automated production deployment of QuizApp to K3s cluster" \
            --parameters "{\"commands\":[
              \"mkdir -p /home/ubuntu/k8s\",
              \"echo '$DEPLOY_BASE64' | base64 -d > /home/ubuntu/k8s/deployment.yaml\",
              \"echo '$SERVICE_BASE64' | base64 -d > /home/ubuntu/k8s/service.yaml\",
              \"sudo kubectl apply -f /home/ubuntu/k8s/deployment.yaml\",
              \"sudo kubectl apply -f /home/ubuntu/k8s/service.yaml\",
              \"sudo kubectl rollout restart deployment production-app || true\",
              \"sudo kubectl get pods\"
            ]}"