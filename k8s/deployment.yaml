apiVersion: apps/v1
kind: Deployment

metadata:
  name: production-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: production-app

  template:
    metadata:
      labels:
        app: production-app

    spec:
      containers:
        - name: production-app

          image: 095055159123.dkr.ecr.ap-south-1.amazonaws.com/producation-app:latest

          ports:
            - containerPort: 3000